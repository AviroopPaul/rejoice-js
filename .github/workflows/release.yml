name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, for example 0.1.1"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump release version
        run: npm run release:version -- ${{ inputs.version }}

      - name: Verify formatting and lint
        run: npm run check

      - name: Build packages
        run: |
          pnpm --filter rejoice-js build
          pnpm --filter create-rejoice-app build

      - name: Check published versions
        id: published
        run: |
          if npm view "rejoice-js@${{ inputs.version }}" version >/dev/null 2>&1; then
            echo "rejoice_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "rejoice_exists=false" >> "$GITHUB_OUTPUT"
          fi

          if npm view "create-rejoice-app@${{ inputs.version }}" version >/dev/null 2>&1; then
            echo "create_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "create_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish rejoice-js
        if: steps.published.outputs.rejoice_exists == 'false'
        working-directory: packages/rejoice
        run: npm publish --access public

      - name: Publish create-rejoice-app
        if: steps.published.outputs.create_exists == 'false'
        working-directory: packages/create-rejoice-app
        run: npm publish --access public

      - name: Commit release version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/rejoice/package.json packages/create-rejoice-app/package.json packages/create-rejoice-app/templates/ts/package.json
          if git diff --cached --quiet; then
            echo "No version changes to commit."
          else
            git commit -m "release: bump packages to ${{ inputs.version }}"
          fi

      - name: Push release commit to main
        run: git push origin HEAD:main

      - name: Create and push tag
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "Tag already exists locally."
          else
            git tag "v${{ inputs.version }}"
          fi
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "GitHub release already exists."
          else
            gh release create "v${{ inputs.version }}" \
              --title "v${{ inputs.version }}" \
              --notes "Published rejoice-js and create-rejoice-app version ${{ inputs.version }}."
          fi
