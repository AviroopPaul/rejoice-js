steps:
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_SERVICE}"
      - "--source=."
      - "--region=${_REGION}"
      - "--port=8080"
      - "--memory=256Mi"
      - "--min-instances=0"
      - "--max-instances=2"
      - "--allow-unauthenticated"

substitutions:
  _SERVICE: rejoice-docs-mcp
  _REGION: us-central1

options:
  logging: CLOUD_LOGGING_ONLY
